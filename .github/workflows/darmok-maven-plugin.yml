name: Publish Darmok Maven Plugin Release

on:
  workflow_dispatch:
concurrency:
  group: sheep-dog-svc
  cancel-in-progress: false
permissions:
  contents: write
  packages: write

jobs:
  darmok-maven-plugin:
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'darmok-maven-plugin'
    secrets: inherit

  merge-into-develop:
    needs: [darmok-maven-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
