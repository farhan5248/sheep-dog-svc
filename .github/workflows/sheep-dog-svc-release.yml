name: Publish Sheep Dog Svc Release

on:
  workflow_dispatch:
concurrency:
  group: sheep-dog-svc
  cancel-in-progress: false
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-asciidoc-api-svc:
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-asciidoc-api-svc'
      # Release builds deploy to qa (snapshot builds deploy to dev, see
      # snapshot-docker.yml). Overrides the svc pom's default of
      # sheepdog.namespace=dev.
      preparation_goals: 'deploy,-DskipTests,-Dsheepdog.namespace=qa'
    secrets: inherit

  sheep-dog-cucumber-gen-svc:
    needs: [sheep-dog-asciidoc-api-svc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-cucumber-gen-svc'
      preparation_goals: 'deploy,-DskipTests,-Dsheepdog.namespace=qa'
    secrets: inherit

  sheep-dog-mcp-svc:
    needs: [sheep-dog-cucumber-gen-svc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-mcp-svc'
      preparation_goals: 'deploy,-DskipTests,-Dsheepdog.namespace=qa'
    secrets: inherit

  sheep-dog-svc-maven-plugin:
    needs: [sheep-dog-mcp-svc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-svc-maven-plugin'
      preparation_goals: 'deploy,-DskipTests,-Dsheepdog.namespace=qa'
    secrets: inherit

  darmok-maven-plugin:
    needs: [sheep-dog-svc-maven-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'darmok-maven-plugin'
      preparation_goals: 'deploy,-DskipTests,-Dsheepdog.namespace=qa'
    secrets: inherit

  # Final step: release the umbrella helm chart. Must run after all
  # image-producing services so versions-maven-plugin:update-properties
  # (invoked by ReleaseMojo inside the chart pom) can resolve the just-
  # released service versions from Nexus. The chart pom doesn't use
  # sheepdog.namespace, so the default preparation_goals is fine.
  sheep-dog-chart:
    needs: [darmok-maven-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog'
    secrets: inherit
