name: Publish Sheep Dog Svc Release

on:
  workflow_dispatch:
concurrency:
  group: sheep-dog-svc
  cancel-in-progress: false
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-asciidoc-api-svc:
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-asciidoc-api-svc'
      # Release builds deploy maven artifacts + docker images to Nexus
      # but skip the helm upgrade/install into a k8s namespace. CI
      # runners don't have enough memory to run both dev and qa; qa is
      # deployed manually on windows-minipc via sheep-dog-ops/sheep-dog/
      # scripts/deploy.bat (from #231) after this workflow completes.
      # Snapshot builds continue to deploy to dev on the runner's k8s
      # (see snapshot-docker.yml, which doesn't pass this flag).
      # -Ppublic activates the ghcr.io mirror push so EKS prod can pull
      # these images (it can't reach LAN Nexus). See #236.
      preparation_goals: 'deploy,-DskipTests,-Dhelm.deploy.skip=true,-Ppublic'
    secrets: inherit

  sheep-dog-cucumber-gen-svc:
    needs: [sheep-dog-asciidoc-api-svc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-cucumber-gen-svc'
      preparation_goals: 'deploy,-DskipTests,-Dhelm.deploy.skip=true,-Ppublic'
    secrets: inherit

  sheep-dog-mcp-svc:
    needs: [sheep-dog-cucumber-gen-svc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-mcp-svc'
      preparation_goals: 'deploy,-DskipTests,-Dhelm.deploy.skip=true,-Ppublic'
    secrets: inherit

  sheep-dog-svc-maven-plugin:
    needs: [sheep-dog-mcp-svc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-svc-maven-plugin'
      preparation_goals: 'deploy,-DskipTests,-Dhelm.deploy.skip=true'
    secrets: inherit

  darmok-maven-plugin:
    needs: [sheep-dog-svc-maven-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'darmok-maven-plugin'
      preparation_goals: 'deploy,-DskipTests,-Dhelm.deploy.skip=true'
    secrets: inherit
