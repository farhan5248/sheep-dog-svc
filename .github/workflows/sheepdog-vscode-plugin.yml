name: Publish SheepDog VS Code Plugin Release
on:
  workflow_dispatch:
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-vscode-plugin:
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-gradle.yml@main
    with:
      project: 'sheep-dog-vscode-plugin'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-vscode-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
