name: Publish SheepDog Eclipse Plugin Release
on:
  workflow_dispatch:
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-eclipse-plugin:
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheepdogeclipseplugin.parent'
      plugin: 'Sheep'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-eclipse-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
